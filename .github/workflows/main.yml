name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install backend dependencies (CI check only)
        run: |
          if [ -d "server" ]; then
            cd server
            npm install
          fi

      - name: Build frontend
        run: |
          if [ -d "client" ]; then
            cd client
            npm install
            npm run build
          fi

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "./"   # send your whole project
          target: ${{ secrets.EC2_PATH }}

      - name: Restart app on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ${{ secrets.EC2_PATH }}
            
            # Install dependencies
            if [ -f "package-lock.json" ]; then
              npm ci --omit=dev
            else
              npm install --omit=dev
            fi

            # Restart with PM2 (safe check)
            if pm2 describe myapp > /dev/null; then
              pm2 restart myapp
            else
              pm2 start server.js --name myapp
            fi

            pm2 save
